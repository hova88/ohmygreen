<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ohmygreen</title>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <h1 class="site-title">ohmygreen</h1>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="#composer">Write</a>
          <a href="#posts">Posts</a>
        </nav>
      </header>

      <hr class="divider" />

      <main>
        <section id="composer" class="composer" aria-labelledby="write-title">
          <h2 id="write-title">New post</h2>
          <form id="post-form">
            <label class="sr-only" for="title">Title</label>
            <input id="title" name="title" placeholder="Post title" minlength="3" maxlength="180" required />

            <label class="sr-only" for="body">Body</label>
            <textarea id="body" name="body" placeholder="Write your note..." required></textarea>

            <div class="composer-footer">
              <p id="status" aria-live="polite"></p>
              <button id="publish-btn" type="submit">Publish</button>
            </div>
          </form>
        </section>

        <section id="posts" class="posts" aria-labelledby="posts-title">
          <h2 class="sr-only" id="posts-title">Posts</h2>
          <article id="featured-post" class="featured-post hidden" aria-live="polite">
            <h2 id="featured-title"></h2>
            <p id="featured-date" class="featured-date"></p>
            <blockquote class="featured-note">
              <span>⚑</span>
              <p>This is the latest published post.</p>
            </blockquote>
            <div id="featured-body" class="featured-body"></div>
          </article>

          <section class="post-list-block" aria-labelledby="recent-title">
            <h3 id="recent-title">Recent posts</h3>
            <p id="post-count" class="post-count"></p>
            <ul id="post-list"></ul>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
