<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ user }} · ohmygreen</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>{{ user }}'s private notes</h1>
      <p class="subtitle">Only your entries are shown in this timeline.</p>
    </header>

    <section class="card">
      <h2>New post</h2>
      <form method="post" action="/posts" class="stack">
        <input type="hidden" name="user" value="{{ user }}" />
        <label>Title</label>
        <input name="title" required placeholder="Tiny thought" />
        <label>Content</label>
        <textarea name="content" rows="7" required placeholder="Write, or draft via CLI+AI and paste here."></textarea>
        <button type="submit">Publish</button>
      </form>
    </section>

    <section>
      {% if posts %}
        {% for post in posts %}
          <article class="post">
            <h3>{{ post.title }}</h3>
            <time>{{ post.created_at }}</time>
            <p>{{ post.content }}</p>
          </article>
        {% endfor %}
      {% else %}
        <p>No posts yet. Start with the CLI agent and post your first draft.</p>
      {% endif %}
    </section>
  </main>
</body>
</html>
